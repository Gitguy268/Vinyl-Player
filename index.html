<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vinyl Record Player</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1e;
  --surface: #242428;
  --surface2: #2e2e33;
  --text: #e8e8e8;
  --text-dim: #777;
  --accent: #e8562a;
  --border: rgba(255,255,255,.1);
  --vinyl-size: min(340px, 60vmin);
  --shadow: 0 4px 24px rgba(0,0,0,.5);
  --t: .3s ease;
  --ah: 14; --as: 80%; --al: 54%;
}

body.light-auto {
  --bg: #e8e5e0;
  --surface: #f5f3ef;
  --surface2: #eae7e2;
  --text: #1a1a1e;
  --text-dim: #888;
  --border: rgba(0,0,0,.1);
  --shadow: 0 4px 24px rgba(0,0,0,.12);
}

.focus { --vinyl-size: min(520px, 85vmin); }
.focus .files, .focus .row, .focus .hint,
.focus .tracklist, .focus .about-wrap, .focus .color-row { display: none; }
.focus .turntable {
  width: calc(var(--vinyl-size) + 100px);
  height: calc(var(--vinyl-size) + 60px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; user-select: none; -webkit-user-select: none;
  transition: background var(--t), color var(--t);
}

.app {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; max-width: 700px; width: 100%;
}

.turntable {
  position: relative;
  width: calc(var(--vinyl-size) + 90px); height: calc(var(--vinyl-size) + 50px);
  border-radius: 14px; background: var(--surface); box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
  transition: background var(--t), box-shadow var(--t), width var(--t), height var(--t);
}

.vinyl-wrap {
  position: relative; width: var(--vinyl-size); height: var(--vinyl-size);
  cursor: grab; margin-left: -16px;
  transition: transform .15s ease, width var(--t), height var(--t);
}
.vinyl-wrap:hover { transform: scale(1.008); }
.vinyl-wrap.dragging { cursor: grabbing; transform: none; }

.vinyl { width: 100%; height: 100%; border-radius: 50%; position: relative; }

.vinyl-disc {
  position: absolute; inset: 0; border-radius: 50%;
  background:
    repeating-radial-gradient(circle, transparent 0, transparent 3px, rgba(0,0,0,.06) 3.5px, transparent 4px),
    radial-gradient(circle, transparent 30%, #141414 31%, #1e1e1e 60%, #141414 100%);
  box-shadow: inset 0 0 30px rgba(0,0,0,.5), inset 0 0 80px rgba(0,0,0,.15), 0 2px 10px rgba(0,0,0,.4);
  transition: background var(--t), box-shadow var(--t);
}

.vinyl-grooves {
  position: absolute; inset: 0; border-radius: 50%;
  background: repeating-radial-gradient(circle, transparent 0, transparent 2.5px, rgba(255,255,255,.018) 3px, transparent 3.5px);
  pointer-events: none;
}

.vinyl-label {
  position: absolute; top: 50%; left: 50%; width: 36%; height: 36%;
  transform: translate(-50%, -50%); border-radius: 50%; background: var(--accent);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  z-index: 2; transition: background var(--t);
}
.vinyl-label .cover-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
.vinyl-label .no-cover { font-size: 10px; color: rgba(255,255,255,.65); text-align: center; }

.vinyl-spindle {
  position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
  transform: translate(-50%, -50%); border-radius: 50%; background: #444;
  border: 2px solid #555; z-index: 3;
}

.vinyl-highlight {
  position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 4;
  opacity: .35; mix-blend-mode: screen; transition: opacity var(--t);
}
.vinyl-sheen {
  position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 4;
  background: radial-gradient(ellipse 70% 50% at 35% 30%, rgba(255,255,255,.1) 0%, transparent 60%);
  mix-blend-mode: screen; opacity: .6;
}
.vinyl-iridescent {
  position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 4;
  background: conic-gradient(from 0deg,
    rgba(255,80,80,.04), rgba(255,200,50,.04), rgba(80,255,80,.04),
    rgba(50,200,255,.04), rgba(180,80,255,.04), rgba(255,80,80,.04));
  -webkit-mask: radial-gradient(circle, transparent 48%, black 52%, black 92%, transparent 96%);
  mask: radial-gradient(circle, transparent 48%, black 52%, black 92%, transparent 96%);
  mix-blend-mode: screen; opacity: .7;
}
.vinyl-dust {
  position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 5; opacity: .08;
  background:
    repeating-linear-gradient(37deg, transparent, transparent 5px, rgba(255,255,255,.025) 5.5px, transparent 6px),
    repeating-linear-gradient(143deg, transparent, transparent 8px, rgba(255,255,255,.015) 8.5px, transparent 9px);
}
.vinyl-glow {
  position: absolute; inset: -5px; border-radius: 50%; pointer-events: none; z-index: 1;
  border: 2px solid transparent; transition: border-color .25s ease, box-shadow .25s ease;
}
.vinyl-wrap:hover .vinyl-glow {
  border-color: hsla(var(--ah), var(--as), var(--al), .25);
  box-shadow: 0 0 20px hsla(var(--ah), var(--as), var(--al), .1);
}

.tonearm {
  position: absolute; right: 16px; top: -8px; width: 50px;
  height: calc(var(--vinyl-size) * 0.55); z-index: 10; cursor: grab;
  transform-origin: top center;
  transition: transform .6s cubic-bezier(.4,.15,.2,1), height var(--t);
  touch-action: none;
}
.tonearm.off { transform: rotate(-8deg); }
.tonearm.arm-dragging { transition: height var(--t); cursor: grabbing; }

.tonearm-base {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 24px; border-radius: 50%;
  background: radial-gradient(circle, #666 30%, #444); box-shadow: 0 2px 6px rgba(0,0,0,.4);
}
.tonearm-bar {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 4px; height: calc(100% - 24px);
  background: linear-gradient(90deg, #777, #aaa 40%, #888); border-radius: 2px;
}
.tonearm-head {
  position: absolute; bottom: -3px; left: 50%; transform: translateX(-50%) rotate(-10deg);
  width: 12px; height: 18px; background: linear-gradient(180deg, #999, #666);
  border-radius: 2px 2px 1px 1px;
}
.tonearm-head::after {
  content: ''; position: absolute; bottom: -3px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 5px; background: #ccc; border-radius: 0 0 1px 1px;
}

.theme-wood .turntable {
  background: repeating-linear-gradient(92deg, #5a3e28 0, #6b4c33 3px, #5a3e28 5px, #4d3320 8px, #5e422c 11px);
}
.theme-wood .vinyl-disc {
  background:
    repeating-radial-gradient(circle, transparent 0, transparent 3px, rgba(0,0,0,.09) 3.5px, transparent 4px),
    radial-gradient(circle, transparent 30%, #0d0d0d 31%, #181818 60%, #0d0d0d 100%);
}
.theme-clear .vinyl-disc {
  background:
    repeating-radial-gradient(circle, transparent 0, transparent 3px, rgba(255,255,255,.03) 3.5px, transparent 4px),
    radial-gradient(circle, transparent 30%, rgba(180,180,195,.18) 31%, rgba(160,160,175,.12) 60%, rgba(140,140,155,.2) 100%);
  box-shadow: inset 0 0 20px rgba(255,255,255,.06), inset 0 0 60px rgba(255,255,255,.03), 0 2px 16px rgba(0,0,0,.2);
}
.theme-clear .vinyl-grooves {
  background: repeating-radial-gradient(circle, transparent 0, transparent 2.5px, rgba(255,255,255,.03) 3px, transparent 3.5px);
}
.theme-clear .vinyl-highlight { opacity: .55; }
.theme-clear .vinyl-sheen { opacity: .8; }
.theme-clear .vinyl-iridescent { opacity: 1; }
.theme-clear .vinyl-dust { opacity: .03; }

.row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; width: 100%; }

button, select {
  font-family: inherit; font-size: 12px; padding: 6px 12px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text); cursor: pointer;
  transition: background var(--t), border-color var(--t), color var(--t);
}
button:hover, select:hover { border-color: var(--accent); }
button:disabled { opacity: .35; cursor: not-allowed; }
button.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.group { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }

input[type="range"] {
  -webkit-appearance: none; appearance: none; width: 64px; height: 4px;
  border-radius: 2px; background: var(--border); outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); }
input[type="range"]::-moz-range-thumb { width: 12px; height: 12px; border: none; border-radius: 50%; background: var(--accent); }

input[type="color"] {
  -webkit-appearance: none; appearance: none; width: 28px; height: 28px;
  border: 2px solid var(--border); border-radius: 6px; cursor: pointer;
  background: none; padding: 0; overflow: hidden;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
input[type="color"]::-moz-color-swatch { border: none; border-radius: 4px; }

.hex-input {
  font-family: monospace; font-size: 11px; width: 68px; padding: 4px 6px;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--surface); color: var(--text); text-align: center; outline: none;
  transition: border-color var(--t), background var(--t), color var(--t);
}
.hex-input:focus { border-color: var(--accent); }

label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }

.files { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.files label {
  font-size: 11px; padding: 5px 12px; border-radius: 6px;
  background: var(--surface); border: 1px dashed var(--border); color: var(--text-dim); cursor: pointer;
  transition: background var(--t), border-color var(--t), color var(--t);
}
.files label:hover { border-color: var(--accent); }
.files input[type="file"] { display: none; }

.hint { font-size: 10px; color: var(--text-dim); text-align: center; min-height: 14px; transition: color var(--t); }

.tracklist {
  width: 100%; background: var(--surface); border-radius: 10px; padding: 12px 16px;
  box-shadow: var(--shadow); transition: background var(--t), box-shadow var(--t);
  max-height: 260px; overflow-y: auto;
}
.tracklist::-webkit-scrollbar { width: 4px; }
.tracklist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.tracklist h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 8px; }
.tracklist ol { list-style: none; counter-reset: track; }
.tracklist li {
  counter-increment: track; display: flex; align-items: center;
  padding: 7px 8px; border-radius: 6px; font-size: 12px; cursor: pointer;
  transition: background .15s ease; gap: 10px;
}
.tracklist li:hover { background: var(--surface2); }
.tracklist li.active { background: var(--accent); color: #fff; }
.tracklist li.active .trk-dur { color: rgba(255,255,255,.7); }
.tracklist li::before { content: counter(track, decimal-leading-zero); font-size: 10px; color: var(--text-dim); min-width: 18px; }
.tracklist li.active::before { color: rgba(255,255,255,.6); }
.trk-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trk-dur { font-size: 10px; color: var(--text-dim); font-variant-numeric: tabular-nums; flex-shrink: 0; }
.trk-rm {
  font-size: 10px; color: var(--text-dim); background: none; border: none; padding: 2px 5px;
  cursor: pointer; opacity: 0; transition: opacity .15s; flex-shrink: 0; line-height: 1;
}
.tracklist li:hover .trk-rm { opacity: .7; }
.trk-rm:hover { opacity: 1 !important; color: var(--accent); }
.tracklist li.active .trk-rm { color: rgba(255,255,255,.6); }
.tracklist-empty { font-size: 11px; color: var(--text-dim); text-align: center; padding: 10px 0; font-style: italic; }

.color-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; width: 100%; }
.color-group { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
.color-group .swatch-label { min-width: 24px; text-align: right; }

.about-wrap { width: 100%; }
.about-toggle {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px; font-size: 12px; color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background var(--t), border-color var(--t), color var(--t);
}
.about-toggle:hover { border-color: var(--accent); }
.about-toggle .arrow { transition: transform var(--t); font-size: 10px; }
.about-wrap.open .about-toggle .arrow { transform: rotate(180deg); }
.about-body {
  max-height: 0; overflow: hidden;
  transition: max-height .4s ease, padding .3s ease;
  background: var(--surface); border-radius: 0 0 10px 10px;
  padding: 0 16px; font-size: 12px; line-height: 1.7; color: var(--text-dim);
}
.about-wrap.open .about-body { max-height: 300px; padding: 12px 16px 16px; }
.about-body .sleeve-line { display: flex; gap: 8px; padding: 2px 0; }
.about-body .sleeve-label {
  text-transform: uppercase; font-size: 9px; letter-spacing: 1px;
  color: var(--text-dim); min-width: 72px; flex-shrink: 0; padding-top: 1px;
}
.about-body .sleeve-val { color: var(--text); }
.about-body .sleeve-notes {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
  font-style: italic; color: var(--text-dim);
}

.focus-bar { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; }

@media (max-width: 480px) {
  :root { --vinyl-size: min(260px, 70vmin); }
  .focus { --vinyl-size: min(380px, 85vmin); }
  .turntable { width: calc(var(--vinyl-size) + 60px); height: calc(var(--vinyl-size) + 40px); }
  .tonearm { right: 6px; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="hint" id="hint">Load audio files to start</div>

  <div class="files">
    <label>🖼 Cover image<input type="file" id="coverIn" accept="image/png,image/jpeg"></label>
    <label>🎵 Add audio files<input type="file" id="audioIn" accept="audio/mpeg,audio/wav" multiple></label>
  </div>

  <div class="turntable" id="turntable">
    <div class="vinyl-wrap" id="vinylWrap">
      <div class="vinyl" id="vinyl">
        <div class="vinyl-disc"></div>
        <div class="vinyl-grooves"></div>
        <div class="vinyl-label">
          <img class="cover-img" id="coverImg" alt="">
          <span class="no-cover" id="noCover">No Cover</span>
        </div>
        <div class="vinyl-spindle"></div>
        <div class="vinyl-highlight" id="highlight"></div>
        <div class="vinyl-sheen"></div>
        <div class="vinyl-iridescent"></div>
        <div class="vinyl-dust"></div>
      </div>
      <div class="vinyl-glow"></div>
    </div>
    <div class="tonearm off" id="tonearm">
      <div class="tonearm-base"></div>
      <div class="tonearm-bar"></div>
      <div class="tonearm-head"></div>
    </div>
  </div>

  <div class="tracklist">
    <h3>Tracklist</h3>
    <ol id="tracklistOl"></ol>
    <div class="tracklist-empty" id="tracklistEmpty">No tracks — add audio files above</div>
  </div>

  <div class="row">
    <button id="prevBtn" disabled title="Previous track">⏮</button>
    <button id="playBtn" disabled>▶ Play</button>
    <button id="nextBtn" disabled title="Next track">⏭</button>
    <select id="themeSel">
      <option value="">Minimal</option>
      <option value="theme-wood">Wood</option>
      <option value="theme-clear">Clear</option>
    </select>
    <button id="modeBtn" title="Light / dark mode">☀</button>
  </div>

  <div class="color-row">
    <div class="color-group">
      <span class="swatch-label">Accent</span>
      <input type="color" id="accentPick" value="#e8562a">
      <input type="text" class="hex-input" id="accentHex" value="#e8562a" maxlength="7" spellcheck="false">
    </div>
    <div class="color-group">
      <span class="swatch-label">BG</span>
      <input type="color" id="bgPick" value="#1a1a1e">
      <input type="text" class="hex-input" id="bgHex" value="#1a1a1e" maxlength="7" spellcheck="false">
    </div>
    <div class="color-group">
      <span class="swatch-label">Panel</span>
      <input type="color" id="surfacePick" value="#242428">
      <input type="text" class="hex-input" id="surfaceHex" value="#242428" maxlength="7" spellcheck="false">
    </div>
    <div class="color-group">
      <span class="swatch-label">Text</span>
      <input type="color" id="textPick" value="#e8e8e8">
      <input type="text" class="hex-input" id="textHex" value="#e8e8e8" maxlength="7" spellcheck="false">
    </div>
  </div>

  <div class="row">
    <div class="group"><span>Vol</span><input type="range" id="vol" min="0" max="1" step=".01" value=".8"></div>
    <div class="group" id="time">0:00 / 0:00</div>
    <div class="group"><label><input type="checkbox" id="scratchChk"> Scratch</label></div>
  </div>

  <div class="row">
    <div class="group"><span>Bass</span><input type="range" id="bassSlider" min="-12" max="12" step="1" value="0"></div>
    <div class="group"><span>Mid</span><input type="range" id="midSlider" min="-12" max="12" step="1" value="0"></div>
    <div class="group"><span>Treble</span><input type="range" id="trebleSlider" min="-12" max="12" step="1" value="0"></div>
    <div class="group"><span>Vinyl noise</span><input type="range" id="noiseSlider" min="0" max="1" step=".01" value="0"></div>
  </div>

  <div class="about-wrap" id="aboutWrap">
    <button class="about-toggle" id="aboutToggle">
      <span>About This Album</span>
      <span class="arrow">▼</span>
    </button>
    <div class="about-body">
      <div class="sleeve-line"><span class="sleeve-label">Artist</span><span class="sleeve-val" id="aboutArtist">—</span></div>
      <div class="sleeve-line"><span class="sleeve-label">Year</span><span class="sleeve-val" id="aboutYear">—</span></div>
      <div class="sleeve-line"><span class="sleeve-label">Producers</span><span class="sleeve-val" id="aboutProd">—</span></div>
      <div class="sleeve-line"><span class="sleeve-label">Genre</span><span class="sleeve-val" id="aboutGenre">—</span></div>
      <div class="sleeve-notes" id="aboutNotes">Load audio files and edit these fields by clicking them.</div>
    </div>
  </div>

  <div class="focus-bar">
    <button id="focusBtn" title="Focus mode">⛶ Focus</button>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
(() => {
  'use strict';

  /* ── DOM refs ──────────────────────────────── */
  const $ = id => document.getElementById(id);
  const app=$('app'), hint=$('hint'), coverIn=$('coverIn'), audioIn=$('audioIn');
  const coverImg=$('coverImg'), noCover=$('noCover'), vinylWrap=$('vinylWrap');
  const vinyl=$('vinyl'), highlight=$('highlight'), turntableEl=$('turntable');
  const tonearm=$('tonearm'), playBtn=$('playBtn'), prevBtn=$('prevBtn'), nextBtn=$('nextBtn');
  const themeSel=$('themeSel'), modeBtn=$('modeBtn'), volSlider=$('vol');
  const timeEl=$('time'), scratchChk=$('scratchChk'), focusBtn=$('focusBtn');
  const tracklistOl=$('tracklistOl'), tracklistEmpty=$('tracklistEmpty');
  const aboutWrap=$('aboutWrap'), aboutToggle=$('aboutToggle');
  const bassSlider=$('bassSlider'), midSlider=$('midSlider');
  const trebleSlider=$('trebleSlider'), noiseSlider=$('noiseSlider');
  const audio=$('audio');
  const accentPick=$('accentPick'), accentHex=$('accentHex');
  const bgPick=$('bgPick'), bgHex=$('bgHex');
  const surfacePick=$('surfacePick'), surfaceHex=$('surfaceHex');
  const textPick=$('textPick'), textHex=$('textHex');

  const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
  const safeDuration = () => { const d=audio.duration; return (d && isFinite(d) && d>0) ? d : 0; };

  /* ── Colour helpers ────────────────────────── */
  const hexRe = /^#[0-9a-f]{6}$/i;
  const hexToHSL = hex => {
    let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b); let h=0,s=0,l=(mx+mn)/2;
    if(mx!==mn){const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
    if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}
    return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
  };
  const shiftHex = (hex,amt) => {
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    if(amt>0){r+=(255-r)*amt;g+=(255-g)*amt;b+=(255-b)*amt;}
    else{const a=-amt;r*=1-a;g*=1-a;b*=1-a;}
    return'#'+[r,g,b].map(c=>Math.min(255,Math.max(0,Math.round(c))).toString(16).padStart(2,'0')).join('');
  };
  const isLightCol = hex => {
    return(parseInt(hex.slice(1,3),16)*299+parseInt(hex.slice(3,5),16)*587+parseInt(hex.slice(5,7),16)*114)/1000>140;
  };

  const root=document.documentElement.style;
  let hasCustomColours=false;

  const applyAccent = hex => {
    if(!hexRe.test(hex))return;const[h,s,l]=hexToHSL(hex);
    root.setProperty('--accent',hex);root.setProperty('--ah',h);
    root.setProperty('--as',s+'%');root.setProperty('--al',l+'%');
    accentPick.value=hex;accentHex.value=hex;
  };
  const applyBg = hex => {
    if(!hexRe.test(hex))return;root.setProperty('--bg',hex);
    bgPick.value=hex;bgHex.value=hex;
    hasCustomColours=true;document.body.classList.remove('light-auto');
  };
  const applySurface = hex => {
    if(!hexRe.test(hex))return;root.setProperty('--surface',hex);
    root.setProperty('--surface2',shiftHex(hex,isLightCol(hex)?-.05:.08));
    root.setProperty('--border',isLightCol(hex)?'rgba(0,0,0,.1)':'rgba(255,255,255,.1)');
    surfacePick.value=hex;surfaceHex.value=hex;
    hasCustomColours=true;document.body.classList.remove('light-auto');
  };
  const applyText = hex => {
    if(!hexRe.test(hex))return;root.setProperty('--text',hex);
    root.setProperty('--text-dim',shiftHex(hex,isLightCol(hex)?-.35:.35));
    textPick.value=hex;textHex.value=hex;
    hasCustomColours=true;document.body.classList.remove('light-auto');
  };

  const wireColour = (pick,hexIn,fn) => {
    pick.addEventListener('input',()=>{fn(pick.value);savePrefs();});
    hexIn.addEventListener('input',()=>{
      let v=hexIn.value.trim();if(v.length&&v[0]!=='#')v='#'+v;
      if(hexRe.test(v)){fn(v);savePrefs();}
    });
    hexIn.addEventListener('keydown',e=>{if(e.key==='Enter')hexIn.blur();});
  };
  wireColour(accentPick,accentHex,applyAccent);
  wireColour(bgPick,bgHex,applyBg);
  wireColour(surfacePick,surfaceHex,applySurface);
  wireColour(textPick,textHex,applyText);

  /* ── Preferences ───────────────────────────── */
  const PREFS_KEY='vinyl-prefs',TRACKS_KEY='vinyl-tracks';
  const loadPrefs=()=>{try{return JSON.parse(localStorage.getItem(PREFS_KEY))||{};}catch{return{};}};
  const savePrefs=()=>{localStorage.setItem(PREFS_KEY,JSON.stringify({
    theme:themeSel.value,lightMode:document.body.classList.contains('light-auto'),
    volume:volSlider.value,bass:bassSlider.value,mid:midSlider.value,
    treble:trebleSlider.value,noise:noiseSlider.value,
    accent:accentPick.value,bg:bgPick.value,surface:surfacePick.value,
    text:textPick.value,hasCustomColours
  }));};

  const prefs=loadPrefs();
  if(prefs.theme)themeSel.value=prefs.theme;
  if(prefs.volume!=null)volSlider.value=prefs.volume;
  if(prefs.bass!=null)bassSlider.value=prefs.bass;
  if(prefs.mid!=null)midSlider.value=prefs.mid;
  if(prefs.treble!=null)trebleSlider.value=prefs.treble;
  if(prefs.noise!=null)noiseSlider.value=prefs.noise;
  if(prefs.hasCustomColours){if(prefs.bg)applyBg(prefs.bg);if(prefs.surface)applySurface(prefs.surface);if(prefs.text)applyText(prefs.text);}
  if(prefs.accent)applyAccent(prefs.accent);
  if(prefs.lightMode&&!prefs.hasCustomColours){document.body.classList.add('light-auto');modeBtn.textContent='🌙';}
  if(themeSel.value)app.classList.add(themeSel.value);
  audio.volume=parseFloat(volSlider.value);

  /* ── Web Audio (lazy init) ─────────────────── */
  let audioCtx=null,srcNode=null,bassEQ=null,midEQ=null,trebleEQ=null;
  let masterGain=null,noiseNode=null,noiseGain=null,ctxReady=false;

  const ensureCtx=()=>{
    if(ctxReady){if(audioCtx.state==='suspended')audioCtx.resume();return;}
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    srcNode=audioCtx.createMediaElementSource(audio);
    bassEQ=audioCtx.createBiquadFilter();bassEQ.type='lowshelf';bassEQ.frequency.value=200;bassEQ.gain.value=parseFloat(bassSlider.value);
    midEQ=audioCtx.createBiquadFilter();midEQ.type='peaking';midEQ.frequency.value=1000;midEQ.Q.value=.5;midEQ.gain.value=parseFloat(midSlider.value);
    trebleEQ=audioCtx.createBiquadFilter();trebleEQ.type='highshelf';trebleEQ.frequency.value=3000;trebleEQ.gain.value=parseFloat(trebleSlider.value);
    masterGain=audioCtx.createGain();masterGain.gain.value=1;
    srcNode.connect(bassEQ).connect(midEQ).connect(trebleEQ).connect(masterGain).connect(audioCtx.destination);
    const sr=audioCtx.sampleRate,len=sr*3,buf=audioCtx.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=Math.random()<.004?(Math.random()-.5)*.55:Math.random()<.015?(Math.random()-.5)*.07:(Math.random()-.5)*.005;
    noiseNode=audioCtx.createBufferSource();noiseNode.buffer=buf;noiseNode.loop=true;
    noiseGain=audioCtx.createGain();noiseGain.gain.value=parseFloat(noiseSlider.value)*.3;
    noiseNode.connect(noiseGain).connect(audioCtx.destination);noiseNode.start();
    ctxReady=true;
  };

  /* ── Player state ──────────────────────────── */
  let playing=false, needleOn=false, trackLoaded=false;
  let vinylDragging=false, scratch=false, vinylWasDragPlaying=false;
  let angle=0, velocity=0, lastTs=0;
  let dragStart=0, dragBase=0, dragTime=0, prevDragA=0;

  const SPEED=1.8, FRICTION=.93, SEC_DEG=1.8/360, SEC_DEG_S=3.6/360;
  const NEEDLE_OFF=-8, NEEDLE_START=8, NEEDLE_END=24;

  /* ── Tonearm drag state ────────────────────── */
  let armDragging=false, armDidMove=false, armWasPlaying=false;
  let armStartPointerAngle=0, armStartArmAngle=0;
  let armPivotX=0, armPivotY=0;

  /* ── IndexedDB ─────────────────────────────── */
  const DB_NAME='vinyl-db',DB_STORE='tracks';
  let db=null;
  const openDB=()=>new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(DB_STORE))r.result.createObjectStore(DB_STORE,{keyPath:'id'});};
    r.onsuccess=()=>{db=r.result;res();};r.onerror=()=>rej(r.error);
  });
  const dbPut=(id,name,buffer,mime)=>new Promise(res=>{
    if(!db){res();return;}
    try{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put({id,name,buffer,mime});
    tx.oncomplete=()=>res();tx.onerror=()=>{console.warn('DB write failed');res();};}
    catch(e){console.warn('DB error',e);res();}
  });
  const dbDel=id=>new Promise(res=>{
    if(!db){res();return;}
    try{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete=()=>res();tx.onerror=()=>res();}catch{res();}
  });
  const dbAll=()=>new Promise(res=>{
    if(!db){res([]);return;}
    try{const tx=db.transaction(DB_STORE,'readonly'),r=tx.objectStore(DB_STORE).getAll();
    r.onsuccess=()=>res(r.result||[]);r.onerror=()=>res([]);}catch{res([]);}
  });
  const saveOrder=()=>{try{localStorage.setItem(TRACKS_KEY,JSON.stringify(playlist.map(t=>t.id)));}catch{}};

  /* ── Playlist ──────────────────────────────── */
  let playlist=[], currentIdx=-1, idCounter=Date.now();
  const cleanName=n=>n.replace(/\.[^.]+$/,'');

  const probeDuration=url=>new Promise(res=>{
    const t=new Audio();t.preload='metadata';
    let done=false;
    const finish=v=>{if(done)return;done=true;res(v);try{t.removeAttribute('src');t.load();}catch{}};
    t.addEventListener('loadedmetadata',()=>finish(t.duration||0),{once:true});
    t.addEventListener('error',()=>finish(0),{once:true});
    setTimeout(()=>finish(0),5000);
    t.src=url;
  });

  const isReady=()=>trackLoaded&&currentIdx>=0&&currentIdx<playlist.length;

  const updateNav=()=>{
    const has=playlist.length>0;
    playBtn.disabled=!has;prevBtn.disabled=!has;nextBtn.disabled=!has;
  };
  const updatePlayBtn=()=>{
    playBtn.textContent=playing?'⏸':'▶';
    playBtn.classList.toggle('on',playing);
  };

  /* ── Core play / stop ──────────────────────── */
  const doPlay=()=>{
    if(!isReady())return;
    ensureCtx();
    if(!needleOn)setNeedle(true);
    const p=audio.play();
    if(p&&p.then){
      p.then(()=>{playing=true;velocity=SPEED;updatePlayBtn();scrollActive();})
       .catch(()=>{hint.textContent='Tap play again';});
    }else{playing=true;velocity=SPEED;updatePlayBtn();}
  };
  const doStop=()=>{
    audio.pause();playing=false;updatePlayBtn();
  };

  /* ── Track loading ─────────────────────────── */
  const loadTrack=idx=>{
    if(idx<0||idx>=playlist.length)return;
    currentIdx=idx;
    trackLoaded=true;
    audio.src=playlist[idx].url;
    hint.textContent=playlist[idx].name;
    lastRenderIdx=-2;
    renderList();
  };

  const addFiles=async files=>{
    for(const f of files){
      const id='t'+(++idCounter);
      let buffer;
      try{buffer=await f.arrayBuffer();}catch{continue;}
      const mime=f.type||'audio/mpeg';
      await dbPut(id,cleanName(f.name),buffer,mime);
      const blob=new Blob([buffer],{type:mime}),url=URL.createObjectURL(blob);
      const entry={id,name:cleanName(f.name),url,duration:0};
      playlist.push(entry);
      probeDuration(url).then(d=>{entry.duration=d;renderList();});
    }
    renderList();updateNav();saveOrder();
    if(currentIdx<0&&playlist.length)loadTrack(0);
  };

  const restoreTracks=async()=>{
    const rows=await dbAll();if(!rows.length)return;
    for(const r of rows){const n=parseInt(r.id.replace(/\D/g,''),10);if(n>=idCounter)idCounter=n+1;}
    let order;try{order=JSON.parse(localStorage.getItem(TRACKS_KEY));}catch{order=null;}
    const byId={};rows.forEach(r=>{byId[r.id]=r;});
    const ordered=order?order.filter(id=>byId[id]).map(id=>byId[id]):rows;
    rows.forEach(r=>{if(!ordered.includes(r))ordered.push(r);});
    for(const r of ordered){
      const blob=new Blob([r.buffer],{type:r.mime||'audio/mpeg'}),url=URL.createObjectURL(blob);
      const entry={id:r.id,name:r.name,url,duration:0};
      playlist.push(entry);
      probeDuration(url).then(d=>{entry.duration=d;renderList();});
    }
    renderList();updateNav();
    if(playlist.length)loadTrack(0);
  };

  const removeTrack=async idx=>{
    if(idx<0||idx>=playlist.length)return;
    const wasActive=idx===currentIdx,wasPl=playing;
    if(wasActive)doStop();
    URL.revokeObjectURL(playlist[idx].url);
    await dbDel(playlist[idx].id);
    playlist.splice(idx,1);
    if(!playlist.length){
      currentIdx=-1;trackLoaded=false;
      try{audio.removeAttribute('src');audio.load();}catch{}
      hint.textContent='Load audio files to start';
      timeEl.textContent='0:00 / 0:00';
      setNeedle(false);
    }else if(wasActive){
      loadTrack(Math.min(idx,playlist.length-1));
      if(wasPl)doPlay();
    }else if(idx<currentIdx){currentIdx--;}
    lastRenderIdx=-2;
    renderList();updateNav();saveOrder();
  };

  /* ── Tracklist render ──────────────────────── */
  const renderList=()=>{
    tracklistOl.innerHTML='';
    tracklistEmpty.style.display=playlist.length?'none':'block';
    playlist.forEach((t,i)=>{
      const li=document.createElement('li');
      if(i===currentIdx)li.classList.add('active');
      const ti=document.createElement('span');ti.className='trk-title';ti.textContent=t.name;
      const du=document.createElement('span');du.className='trk-dur';du.textContent=t.duration>0?fmt(t.duration):'—';
      const rm=document.createElement('button');rm.className='trk-rm';rm.textContent='✕';rm.title='Remove';
      rm.addEventListener('click',e=>{e.stopPropagation();removeTrack(i);});
      li.append(ti,du,rm);
      li.addEventListener('click',()=>{
        if(i===currentIdx){try{audio.currentTime=0;}catch{}if(!playing)doPlay();return;}
        doStop();loadTrack(i);doPlay();
      });
      tracklistOl.appendChild(li);
    });
  };
  const scrollActive=()=>{const a=tracklistOl.querySelector('li.active');if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'});};

  /* ── Auto-advance ──────────────────────────── */
  audio.addEventListener('ended',()=>{
    if(currentIdx<playlist.length-1){doStop();loadTrack(currentIdx+1);doPlay();}
    else{doStop();try{audio.currentTime=0;}catch{}}
  });

  /* ── Helpers ───────────────────────────────── */
  const fmt=s=>{if(!isFinite(s)||s<0)s=0;return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;};
  const ptrAngle=(el,x,y)=>{const r=el.getBoundingClientRect();return Math.atan2(y-r.top-r.height/2,x-r.left-r.width/2)*180/Math.PI;};
  const wrapDelta=(a,b)=>{let d=a-b;while(d>180)d-=360;while(d<-180)d+=360;return d;};
  const ptr=e=>e.touches&&e.touches.length?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};

  /* ── Needle angle from playback ────────────── */
  const getNeedleAngle=()=>{
    if(!needleOn)return NEEDLE_OFF;
    const d=safeDuration();
    if(d<=0)return NEEDLE_START;
    return NEEDLE_START+(NEEDLE_END-NEEDLE_START)*clamp(audio.currentTime/d,0,1);
  };

  /* Read current visual arm angle from inline style */
  const readArmAngle=()=>{
    const m=tonearm.style.transform.match(/rotate\(([-\d.]+)deg\)/);
    return m?parseFloat(m[1]):NEEDLE_OFF;
  };

  const updateNeedle=()=>{
    if(armDragging)return;
    tonearm.style.transform=`rotate(${getNeedleAngle()}deg)`;
  };

  const setNeedle=on=>{
    needleOn=on;
    tonearm.classList.toggle('off',!on);
    if(!on&&playing)doStop();
    updateNeedle();
  };

  /* ── Tonearm: compute pivot from turntable ─── 
     The pivot is at a fixed position within the turntable:
     - horizontally: right edge minus CSS right minus half arm width
     - vertically: top edge plus CSS top
     We read from computed style so it works at any viewport / focus mode. */
  const getArmPivot=()=>{
    const tr=turntableEl.getBoundingClientRect();
    const armStyle=getComputedStyle(tonearm);
    const rightPx=parseFloat(armStyle.right)||16;
    const topPx=parseFloat(armStyle.top)||-8;
    const armW=parseFloat(armStyle.width)||50;
    return{
      x: tr.right - rightPx - armW/2,
      y: tr.top + topPx
    };
  };

  const pointerAngleFromPivot=(px,py)=>Math.atan2(px-armPivotX,py-armPivotY)*180/Math.PI;

  /* ── Tonearm drag ──────────────────────────── */
  const armOnDown=e=>{
    e.preventDefault();e.stopPropagation();
    const pivot=getArmPivot();
    armPivotX=pivot.x;armPivotY=pivot.y;
    armDragging=true;armDidMove=false;
    armWasPlaying=playing;
    /* Read the actual visual angle, not the computed one from audio position.
       This works whether needle is on or off. */
    armStartArmAngle=readArmAngle();
    const p=ptr(e);
    armStartPointerAngle=pointerAngleFromPivot(p.x,p.y);
    tonearm.classList.add('arm-dragging');
    if(playing)audio.pause();
  };

  const armOnMove=e=>{
    if(!armDragging)return;
    e.preventDefault();
    armDidMove=true;
    const p=ptr(e);
    const cur=pointerAngleFromPivot(p.x,p.y);
    const delta=cur-armStartPointerAngle;
    const newAngle=clamp(armStartArmAngle+delta,NEEDLE_OFF,NEEDLE_END);
    tonearm.style.transform=`rotate(${newAngle}deg)`;

    const d=safeDuration();
    if(newAngle>=NEEDLE_START&&d>0&&trackLoaded){
      if(!needleOn){needleOn=true;tonearm.classList.remove('off');}
      const progress=clamp((newAngle-NEEDLE_START)/(NEEDLE_END-NEEDLE_START),0,1);
      try{audio.currentTime=progress*d;}catch{}
    }else{
      if(needleOn){needleOn=false;tonearm.classList.add('off');}
    }
  };

  const armOnUp=()=>{
    if(!armDragging)return;
    armDragging=false;
    tonearm.classList.remove('arm-dragging');

    /* Tap (no movement) = toggle needle on/off */
    if(!armDidMove){
      if(needleOn){
        setNeedle(false);
      }else if(isReady()){
        ensureCtx();setNeedle(true);doPlay();
      }
      return;
    }

    /* Drag ended — check where arm landed */
    const finalAngle=readArmAngle();
    if(finalAngle>=NEEDLE_START&&isReady()){
      if(!needleOn){needleOn=true;tonearm.classList.remove('off');}
      doPlay();
    }else{
      if(needleOn){needleOn=false;tonearm.classList.add('off');}
      if(playing)doStop();
    }
  };

  tonearm.addEventListener('mousedown',armOnDown);
  tonearm.addEventListener('touchstart',armOnDown,{passive:false});

  /* ── Cover image ───────────────────────────── */
  let coverUrl=null;
  coverIn.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    if(coverUrl)URL.revokeObjectURL(coverUrl);
    coverUrl=URL.createObjectURL(f);
    coverImg.src=coverUrl;coverImg.style.display='block';noCover.style.display='none';
    coverIn.value='';
  });
  audioIn.addEventListener('change',e=>{
    if(e.target.files.length)addFiles(Array.from(e.target.files));
    audioIn.value='';
  });

  /* ── Playback controls ─────────────────────── */
  playBtn.addEventListener('click',()=>{
    if(!playlist.length)return;
    if(playing){doStop();return;}
    if(currentIdx<0)loadTrack(0);
    doPlay();
  });
  prevBtn.addEventListener('click',()=>{
    if(!playlist.length)return;
    const wasPl=playing;
    try{if(audio.currentTime>3&&currentIdx>=0){audio.currentTime=0;return;}}catch{}
    doStop();loadTrack(currentIdx>0?currentIdx-1:playlist.length-1);
    if(wasPl)doPlay();
  });
  nextBtn.addEventListener('click',()=>{
    if(!playlist.length)return;
    const wasPl=playing;
    doStop();loadTrack(currentIdx<playlist.length-1?currentIdx+1:0);
    if(wasPl)doPlay();
  });

  /* ── Sliders ───────────────────────────────── */
  volSlider.addEventListener('input',()=>{audio.volume=parseFloat(volSlider.value);savePrefs();});
  bassSlider.addEventListener('input',()=>{if(bassEQ)bassEQ.gain.value=parseFloat(bassSlider.value);savePrefs();});
  midSlider.addEventListener('input',()=>{if(midEQ)midEQ.gain.value=parseFloat(midSlider.value);savePrefs();});
  trebleSlider.addEventListener('input',()=>{if(trebleEQ)trebleEQ.gain.value=parseFloat(trebleSlider.value);savePrefs();});
  noiseSlider.addEventListener('input',()=>{if(noiseGain)noiseGain.gain.value=parseFloat(noiseSlider.value)*.3;savePrefs();});

  /* ── Theme / mode / focus / about ──────────── */
  themeSel.addEventListener('change',()=>{
    app.classList.remove('theme-wood','theme-clear');
    if(themeSel.value)app.classList.add(themeSel.value);savePrefs();
  });
  modeBtn.addEventListener('click',()=>{
    if(hasCustomColours){hint.textContent='Reset custom colours to use light/dark toggle';return;}
    document.body.classList.toggle('light-auto');
    modeBtn.textContent=document.body.classList.contains('light-auto')?'🌙':'☀';savePrefs();
  });
  focusBtn.addEventListener('click',()=>{
    const on=app.classList.toggle('focus');
    focusBtn.textContent=on?'⛶ Exit Focus':'⛶ Focus';
    focusBtn.classList.toggle('on',on);
  });
  aboutToggle.addEventListener('click',()=>aboutWrap.classList.toggle('open'));
  ['aboutArtist','aboutYear','aboutProd','aboutGenre','aboutNotes'].forEach(id=>{
    const el=$(id);el.contentEditable='true';el.style.outline='none';el.style.cursor='text';el.style.minWidth='40px';
  });
  scratchChk.addEventListener('change',()=>{scratch=scratchChk.checked;});

  /* ── Vinyl drag / scratch ──────────────────── */
  const scrub=totalDeg=>{
    const s=scratch?SEC_DEG_S:SEC_DEG,d=safeDuration();
    if(d<=0)return;
    try{audio.currentTime=clamp(dragTime+totalDeg*s,0,d);}catch{}
  };

  const vinylOnDown=e=>{
    if(!isReady()||armDragging)return;
    e.preventDefault();ensureCtx();
    vinylDragging=true;vinylWasDragPlaying=playing;
    vinylWrap.classList.add('dragging');
    const p=ptr(e);
    dragStart=ptrAngle(vinylWrap,p.x,p.y);
    dragBase=angle;dragTime=audio.currentTime;prevDragA=dragStart;
    audio.pause();velocity=0;
  };
  const vinylOnMove=e=>{
    if(!vinylDragging)return;
    e.preventDefault();
    const p=ptr(e),a=ptrAngle(vinylWrap,p.x,p.y);
    const total=wrapDelta(a,dragStart);
    angle=dragBase+total;scrub(total);
    velocity=wrapDelta(a,prevDragA)*.5;prevDragA=a;
  };
  const vinylOnUp=()=>{
    if(!vinylDragging)return;
    vinylDragging=false;vinylWrap.classList.remove('dragging');
    if(vinylWasDragPlaying&&needleOn){
      const p=audio.play();
      if(p&&p.then)p.then(()=>{playing=true;velocity=SPEED;updatePlayBtn();}).catch(()=>{});
      else{playing=true;velocity=SPEED;updatePlayBtn();}
    }
  };

  vinylWrap.addEventListener('mousedown',vinylOnDown);
  vinylWrap.addEventListener('touchstart',vinylOnDown,{passive:false});

  /* ── Global move / up (shared vinyl + arm) ─── */
  document.addEventListener('mousemove',e=>{vinylOnMove(e);armOnMove(e);
    /* Light reflection */
    const r=vinylWrap.getBoundingClientRect();
    const a=Math.atan2(e.clientY-r.top-r.height/2,e.clientX-r.left-r.width/2)*180/Math.PI;
    highlight.style.background=`conic-gradient(from ${a-20}deg,transparent 0deg,rgba(255,255,255,.1) 30deg,rgba(255,255,255,.03) 55deg,transparent 75deg,transparent 165deg,rgba(255,255,255,.06) 200deg,rgba(255,255,255,.02) 230deg,transparent 260deg)`;
  });
  document.addEventListener('touchmove',e=>{vinylOnMove(e);armOnMove(e);},{passive:false});
  document.addEventListener('mouseup',()=>{vinylOnUp();armOnUp();});
  document.addEventListener('touchend',()=>{vinylOnUp();armOnUp();});

  /* ── Keyboard ──────────────────────────────── */
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&app.classList.contains('focus')){
      app.classList.remove('focus');focusBtn.textContent='⛶ Focus';focusBtn.classList.remove('on');
    }
  });

  /* ── Animation loop ────────────────────────── */
  let lastRenderIdx=-2;

  const tick=ts=>{
    const dt=lastTs?Math.min(ts-lastTs,50):16.67;lastTs=ts;const s=dt/16.67;
    if(!vinylDragging){
      if(playing&&needleOn)velocity=SPEED;
      else{velocity*=FRICTION;if(Math.abs(velocity)<.01)velocity=0;}
      angle+=velocity*s;
    }
    vinyl.style.transform=`rotate(${angle}deg)`;
    if(trackLoaded&&currentIdx>=0){
      const d=safeDuration();
      const ct=audio.currentTime||0;
      timeEl.textContent=`${fmt(ct)} / ${fmt(d)}`;
      updateNeedle();
      if(currentIdx!==lastRenderIdx){
        lastRenderIdx=currentIdx;
        const lis=tracklistOl.children;
        for(let i=0;i<lis.length;i++)lis[i].classList.toggle('active',i===currentIdx);
      }
    }
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);

  /* ── Init ──────────────────────────────────── */
  openDB().then(restoreTracks).catch(()=>{});
  renderList();
})();
</script>

</body>
